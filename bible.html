      {topic:"家人｜父母健康平安",category:"家人",verse:"要孝敬父母，使你得福，在世長壽。",ref:"以弗所書 6:2-3",context:"保羅提醒信徒孝敬父母係神所喜悅嘅事。",explain:"孝敬唔只係責任，也係珍惜神放喺生命入面嘅家人。為父母祝福，係一份愛嘅表達。",blessing:"願主保守你父母身體健康、心裡平安，每日都有主嘅恩典同看顧。阿們。"},

      {topic:"家人｜長輩平安",category:"家人",verse:"直到你們年老，我仍這樣；直到你們髮白，我仍懷搋。",ref:"以賽亞書 46:4",context:"神向祂子民應許，從年少到年老都會承托。",explain:"長輩最需要嘅可能唔只係照顧，而係知道自己仍被珍惜、被神承托。",blessing:"願主保守家中長輩身心平安，日日有恩典，有人關心，有神看顧。阿們。"},
      {topic:"家人｜關係修復",category:"家人",verse:"倘若這人與那人有嫌隙，總要彼此包容，彼此饒恕。",ref:"歌羅西書 3:13",context:"保羅教導信徒用基督嘅饒恕彼此相待。",explain:"家人之間嘅傷有時特別深，但神可以慢慢軟化人心，帶來修復同新開始。",blessing:"願主今日醫治家人之間嘅傷口，賜下溫柔說話、包容同修復嘅機會。阿們。"},
      {topic:"家人｜家庭有力量",category:"家人",verse:"神是我們的避難所，是我們的力量，是我們在患難中隨時的幫助。",ref:"詩篇 46:1",context:"詩人宣告神在患難中係可靠幫助。",explain:"家庭會遇到壓力、病痛、經濟或關係挑戰，但神可以成為全家嘅避難所。",blessing:"願主成為你一家嘅力量，遇到難處時仍有平安、有盼望、有路可行。阿們。"},
      {topic:"家人｜每日家庭祝福",category:"家人",verse:"願賜平安的主隨時隨事親自給你們平安。",ref:"帖撒羅尼迦後書 3:16",context:"保羅為教會祝福，願主親自賜平安。",explain:"每日為家人求平安，係簡單但好有力量嘅禱告。主知道每一個家人嘅需要。",blessing:"願主今日親自賜你一家平安，出入蒙保守，心裡有安穩。阿們。"},
      {topic:"家人｜感恩有屋企人",category:"家人",verse:"我的心哪，你要稱頌耶和華，不可忘記他的一切恩惠。",ref:"詩篇 103:2",context:"大衛提醒自己記念神嘅恩惠。",explain:"家人有時好平凡，甚至有摩擦，但能夠彼此牽掛，本身都係神嘅恩典。",blessing:"願你今日為家人感恩，也願主祝福每一位你心裡記掛嘅屋企人。阿們。"},
      {topic:"家人｜家人出入平安",category:"家人",verse:"你出你入，耶和華要保護你，從今時直到永遠。",ref:"詩篇 121:8",context:"詩人宣告神一路上看顧祂嘅子民。",explain:"屋企人每日出門返工返學，其實都需要神嘅保守。出入平安係好實在嘅祝福。",blessing:"願主今日保守你全家出入平安，路上蒙看顧，心裡有平安。阿們。"},
      {topic:"家人｜身心靈被主保守",category:"家人",verse:"願賜平安的神親自使你們全然成聖。",ref:"帖撒羅尼迦前書 5:23",context:"保羅為信徒身心靈都被神保守而禱告。",explain:"家人需要嘅唔只係身體健康，也需要心裡安穩、靈裡有盼望。",blessing:"願主今日保守你同你家人身心靈，疲累中得力，不安中得平安。阿們。"},
      {topic:"家人｜家中有主的平安",category:"家人",verse:"我留下平安給你們；我將我的平安賜給你們。",ref:"約翰福音 14:27",context:"耶穌臨別前將屬祂嘅平安賜給門徒。",explain:"家裡未必每日都安靜，但主嘅平安可以進入每個房間、每個心情、每段關係。",blessing:"願主嘅平安今日充滿你屋企，讓每個家人都感到被愛同被安慰。阿們。"},
      {topic:"家人｜遠近都被主看顧",category:"家人",verse:"保護你的必不打盹，也不睡覺。",ref:"詩篇 121:4",context:"詩人宣告神日夜守護。",explain:"有啲家人可能唔喺身邊，但神嘅看顧唔受距離限制。",blessing:"願主今日看顧你遠近每一位家人，無論身在何處，都被祂保守。阿們。"},
      {topic:"家人｜多謝神賜下家人同行",category:"家人",verse:"各樣美善的恩賜和各樣全備的賞賜都是從上頭來的。",ref:"雅各書 1:17",context:"雅各提醒信徒，美善恩典都從神而來。",explain:"家人未必完美，但有人同行、有人記掛，已經係神放喺生命入面嘅禮物。",blessing:"願你今日為家人獻上感恩，也願主祝福你們彼此珍惜。阿們。"},
      {topic:"家人｜家人係恩典",category:"家人",verse:"耶和華本為善；他的慈愛永遠長存。",ref:"詩篇 100:5",context:"詩篇呼召人稱謝神嘅良善與慈愛。",explain:"有時最熟悉嘅人，反而最容易被忽略。停一停，就會發現家人係好大恩典。",blessing:"願你今日在家人身上重新看見神嘅恩典，心裡多一份感謝同溫柔。阿們。"},
      {topic:"家人｜平凡日子裡的祝福",category:"家人",verse:"你們要稱謝耶和華，因他本為善。",ref:"詩篇 136:1",context:"詩篇反覆提醒人記念神永遠長存嘅慈愛。",explain:"一餐飯、一句問候、一個訊息，都可以係平凡日子入面嘅家人祝福。",blessing:"願主今日讓你在平凡家常中看見恩典，珍惜眼前人。阿們。"},
      {topic:"家人｜有人同行是一份恩典",category:"家人",verse:"朋友乃時常親愛，弟兄為患難而生。",ref:"箴言 17:17",context:"箴言講到真實關係在困難中更顯珍貴。",explain:"人生唔係每段路都容易，但有家人同行、有家人扶持，已經係神嘅照顧。",blessing:"願你今日感恩有人同行，也願主幫你成為家人嘅支持同祝福。阿們。"},
      {topic:"家人｜一家同心",category:"家人",verse:"若一家自相紛爭，那家就站立不住。",ref:"馬可福音 3:25",context:"耶穌指出同心合一對家庭嘅重要。",explain:"家庭要站得穩，需要少一點互相消耗，多一點同心面對。",blessing:"願主幫助你一家同心同行，面對挑戰時彼此扶持，不彼此傷害。阿們。"},
      {topic:"家人｜愛要常以為虧欠",category:"家人",verse:"凡事都不可虧欠人，惟有彼此相愛，要常以為虧欠。",ref:"羅馬書 13:8",context:"保羅提醒信徒以愛待人，尤其在日常關係中活出愛。",explain:"家人之間唔好只計較邊個做得多，愛可以令關係柔軟返。",blessing:"願主今日幫你同家人多一點愛、多一點體諒、多一點主動關心。阿們。"}
    ];

    function decodeBase64Utf8(base64){
      const binary = atob(base64.replace(/\n/g,''));
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }

    function injectFamilyContent(html){
      let updated = html;
      updated = updated.replace('<button class="category-btn" onclick="filterCards(\'友情支持\')">友情支持</button>', '<button class="category-btn" onclick="filterCards(\'友情支持\')">友情支持</button>\n      <button class="category-btn" onclick="filterCards(\'家人\')">家人</button>');
      const insertText = ',\n' + familyMessages.map(item => `      ${JSON.stringify(item)}`).join(',\n');
      updated = updated.replace(/(\n\s*\];\s*\n\n\s*const grid = document\.getElementById\('messageGrid'\);)/, insertText + '$1');
      updated = updated.replace(/<span id="totalEntries">\d+<\/span>/, `<span id="totalEntries">${161 + familyMessages.length}</span>`);
      return updated;
    }

    fetch(baseBlobApi, {headers:{'Accept':'application/vnd.github+json'}})
      .then(r => {
        if(!r.ok) throw new Error('GitHub base file fetch failed');
        return r.json();
      })
      .then(data => {
        const baseHtml = decodeBase64Utf8(data.content || '');
        const finalHtml = injectFamilyContent(baseHtml);
        document.open();
        document.write(finalHtml);
        document.close();
      })
      .catch(err => {
        document.getElementById('loadingBox').innerHTML = `
          <h1>載入失敗</h1>
          <p>未能讀取完整祝福庫。請稍後重新整理頁面。</p>
          <div class="error">${err.message}</div>
        `;
      });
  </script>
