<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="app-version" content="3.1" />
  <meta name="last-updated" content="2026-06-17" />
  <title>Jeffrey 健身教練｜WhatsApp 關心短訊庫 v3.1</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}
    body{background:#f5f7fb;color:#222;padding:18px;line-height:1.7}
    .loading{max-width:780px;margin:12vh auto;background:white;border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(17,24,39,.10)}
    .loading h1{font-size:1.5rem;margin-bottom:8px;color:#111827}.loading p{color:#6b7280;margin-bottom:10px}
    .version{display:inline-block;margin-top:8px;background:#111827;color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800}
    .error{color:#b91c1c;background:#fef2f2;border-radius:14px;padding:12px;margin-top:12px}
  </style>
</head>
<body>
  <div class="loading" id="loadingBox">
    <h1>Jeffrey 健身教練｜WhatsApp 關心短訊庫</h1>
    <p>正在載入標準版頁面結構...</p>
    <span class="version">v3.1 · Standard Structure</span>
  </div>

  <script>
    const PAGE_VERSION = '3.1';
    const PAGE_NAME = 'Jeffrey WhatsApp Messages';
    const BASE_BLOB_API = 'https://api.github.com/repos/hudsonmar-852/Jeffrey/git/blobs/a7df98b60c46b5266925397f1192fbb91512c94b';

    function decodeBase64Utf8(base64){
      const binary = atob(base64.replace(/\n/g,''));
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }

    function standardize(html){
      let updated = html;
      updated = updated.replace(/<title>.*?<\/title>/, `<title>Jeffrey 健身教練｜WhatsApp 關心短訊庫 v${PAGE_VERSION}</title>`);
      updated = updated.replace('Jeffrey 健身教練｜高回覆率 WhatsApp 關心短訊庫 🔥', `Jeffrey 健身教練｜高回覆率 WhatsApp 關心短訊庫 🔥 <small style="display:block;font-size:13px;color:#d1d5db;margin-top:6px">v${PAGE_VERSION} · Standard Structure</small>`);
      updated = updated.replace('https://hudsonmar-852.github.io/bible/', 'https://hudsonmar-852.github.io/jeffrey/bible/');
      updated = updated.replace('長按或按「📋 一鍵 Copy 去 WhatsApp」即可複製內容 💬', `長按或按「📋 一鍵 Copy 去 WhatsApp」即可複製內容 💬｜v${PAGE_VERSION}`);
      return updated;
    }

    fetch(BASE_BLOB_API, {headers:{'Accept':'application/vnd.github+json'}})
      .then(r => { if(!r.ok) throw new Error('GitHub base file fetch failed'); return r.json(); })
      .then(data => {
        const baseHtml = decodeBase64Utf8(data.content || '');
        const finalHtml = standardize(baseHtml);
        document.open();
        document.write(finalHtml);
        document.close();
      })
      .catch(err => {
        document.getElementById('loadingBox').innerHTML = `
          <h1>載入失敗</h1>
          <p>${PAGE_NAME} 未能讀取完整內容。請稍後重新整理頁面。</p>
          <div class="error">${err.message}</div>
        `;
      });
  </script>
</body>
</html>
