<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeffrey 健身教練・每日關心短訊模板</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif}
    body{background:#f5f7fb;color:#222;padding:20px;line-height:1.6}
    .container{max-width:1000px;margin:auto}
    .hero{text-align:center;margin-bottom:24px}
    .hero h1{font-size:2rem;margin-bottom:10px;color:#111827}
    .hero p{color:#6b7280;font-size:1rem}
    .site-nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 24px}
    .site-nav a{display:inline-block;text-decoration:none;background:#111827;color:#fff;padding:11px 16px;border-radius:999px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .site-nav a.secondary{background:white;color:#111827}
    .search-box{margin-bottom:25px}
    .search-box input{width:100%;padding:16px;border-radius:16px;border:none;outline:none;font-size:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .category-buttons{display:flex;gap:10px;overflow-x:auto;margin-bottom:25px;padding-bottom:10px}
    .category-btn{border:none;background:white;padding:10px 18px;border-radius:999px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.08);white-space:nowrap;transition:.2s}
    .category-btn:hover{background:#111827;color:white}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
    .card{background:white;border-radius:24px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.08);transition:transform .2s ease;display:flex;flex-direction:column;justify-content:space-between}
    .card:hover{transform:translateY(-4px)}
    .card-number{font-size:13px;color:#9ca3af;margin-bottom:10px}
    .topic{font-size:1.25rem;font-weight:700;margin-bottom:15px;color:#111827}
    .content{line-height:1.8;color:#374151;margin-bottom:20px;white-space:pre-wrap}
    .copy-btn{background:#111827;color:white;border:none;border-radius:14px;padding:14px;cursor:pointer;font-size:15px;font-weight:600;transition:.2s}
    .copy-btn:hover{opacity:.9}.copy-success{background:#16a34a!important}
    footer{text-align:center;margin-top:40px;color:#9ca3af;font-size:14px}
    @media(max-width:768px){.hero h1{font-size:1.6rem}.site-nav{justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>🏋️ 健身教練・每日關心短訊模板</h1>
      <p>廣東話・自然貼地・可一鍵複製 WhatsApp 訊息</p>
    </header>

    <nav class="site-nav" aria-label="Jeffrey 網站主選單">
      <a href="gym_m.html">📱 手機版健身教材</a>
      <a href="gym.html">📘 JEFFREY 健身教材</a>
      <a class="secondary" href="index.html">💬 每日關心短訊</a>
    </nav>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋：今日雨天、飲水、拉筋、睡眠、情緒..." />
    </div>

    <div class="category-buttons">
      <button class="category-btn" onclick="filterCards('all')">全部</button>
      <button class="category-btn" onclick="filterCards('今日雨天')">今日雨天</button>
      <button class="category-btn" onclick="filterCards('飲水')">飲水</button>
      <button class="category-btn" onclick="filterCards('拉筋')">拉筋</button>
      <button class="category-btn" onclick="filterCards('睡眠')">睡眠</button>
      <button class="category-btn" onclick="filterCards('情緒')">情緒</button>
      <button class="category-btn" onclick="filterCards('恢復')">恢復</button>
    </div>

    <main class="grid" id="messageGrid"></main>

    <footer>長按或按 Copy 即可複製內容貼去 WhatsApp 💬</footer>
  </div>

  <script>
    const messages = [
      {topic:"🌧️ 今日雨天濕熱提醒",category:"今日雨天",content:"今日又落雨又焗，唔好以為冇太陽就唔會流汗。記得少少多次飲水，身體舒服好多 🌧️💧"},
      {topic:"☔ 出門防滑提醒",category:"今日雨天",content:"今日地下濕滑，出街行慢半拍。鞋底要踩實，落樓梯扶一扶，安全先係最型 ☔"},
      {topic:"💦 雨天都要補水",category:"今日雨天",content:"落雨天都會焗到出汗，唔好等口乾先飲。每隔一陣飲幾啖，精神會穩好多 💦"},
      {topic:"🧦 濕鞋濕襪提醒",category:"今日雨天",content:"如果鞋襪濕咗，返到去盡快換。腳長時間焗住好易攰同唔舒服，照顧細節就係照顧身體 🧦"},
      {topic:"🌬️ 冷氣房保暖",category:"今日雨天",content:"今日外面濕熱，入到冷氣房好易一凍一熱。帶件薄外套，唔好俾肩頸凍到硬晒 🌬️"},
      {topic:"🧘 雨天肩頸放鬆",category:"今日雨天",content:"落雨天濕氣重，肩頸特別易實。抽30秒轉下膊、拉下頸，唔使大動作都有用 🧘"},
      {topic:"🚶 室內步行版",category:"今日雨天",content:"今日唔方便戶外行，就喺室內行幾分鐘。搭𨋢前後、茶水間來回，都算係俾身體郁返 🚶"},
      {topic:"🥵 濕熱降溫提醒",category:"今日雨天",content:"又濕又熱最易令人冇精神。飲水、抹汗、鬆一鬆領口，唔好硬頂，身體會舒服返啲 🥵"},
      {topic:"😴 雨天睡眠提醒",category:"今日雨天",content:"今晚濕氣重，瞓前開少少抽濕或者風扇，房間舒服啲，瞓得自然沉啲 😴"},
      {topic:"❤️ 今日溫柔收尾",category:"今日雨天",content:"今日天氣又濕又焗，已經唔容易。記得飲水、行慢啲、拉一拉筋，照顧自己就夠好 ❤️"},
      {topic:"💧 起身第一杯水",category:"飲水",content:"起身第一件事唔係睇電話，係飲幾啖水。身體瞓咗成晚，先幫佢開機 💧"},
      {topic:"🪑 坐耐起身郁",category:"拉筋",content:"坐咗一個鐘就起身30秒，伸下腰、轉下膊。唔使流汗，重點係唔好俾身體生銹 🪑"},
      {topic:"🥗 午餐後輕行",category:"恢復",content:"食完飯唔好即刻攤低，行5至10分鐘。消化順啲，下午冇咁易飯氣攻心 🥗"},
      {topic:"👣 腳踝小運動",category:"拉筋",content:"坐低都可以郁腳踝，順時針逆時針各轉10下。小動作，對小腿同循環好有幫助 👣"},
      {topic:"🫁 深呼吸 reset",category:"情緒",content:"覺得心煩或者攰，停一停，慢慢吸氣4秒、呼氣6秒，做3次。人會即刻定啲 🫁"},
      {topic:"🧍 站姿提醒",category:"拉筋",content:"企立時唔好成日側埋一邊，兩腳平均踩地，肚微收。腰背會少啲投訴 🧍"},
      {topic:"🍵 下午提神版",category:"飲水",content:"下午眼瞓未必一定要咖啡，先飲杯水再行兩分鐘。好多時係身體缺水同太耐冇郁 🍵"},
      {topic:"🧊 運動前熱身",category:"恢復",content:"開練前唔好即刻上重量，先做5分鐘熱身。關節醒咗，肌肉先識幫你出力 🧊"},
      {topic:"🍌 運動後補充",category:"恢復",content:"練完記得補水同食返少少蛋白質。肌肉唔係練嗰刻變強，係恢復嗰陣變強 🍌"},
      {topic:"📱 手機頸提醒",category:"拉筋",content:"睇電話唔好成個頭跌落去，手機拎高少少。頸椎唔係吊機，唔好日日叫佢頂硬上 📱"},
      {topic:"🛁 熱水沖涼放鬆",category:"恢復",content:"今日如果覺得肌肉緊，沖涼時用暖水淋下肩背同小腿。放鬆咗，瞓覺都舒服啲 🛁"},
      {topic:"🧠 小目標提醒",category:"情緒",content:"今日唔使追求完美，只要飲夠水、郁過、拉過少少，已經係有照顧自己 🧠"},
      {topic:"🥱 午後疲勞關懷",category:"情緒",content:"下午攰係正常，唔代表你懶。起身伸一伸、飲啖水，俾身體重新入返狀態 🥱"},
      {topic:"🦵 小腿放鬆",category:"拉筋",content:"今日行得多，夜晚記得拉下小腿。腳跟踩低、身體微前，30秒就夠，明日冇咁繃 🦵"},
      {topic:"🥤 飲水打卡",category:"飲水",content:"而家望一望水樽，少過一半就飲幾啖。唔使一次飲好多，重點係唔好成日忘記 🥤"},
      {topic:"🌙 睡前收工儀式",category:"睡眠",content:"瞓前30分鐘開始收慢，燈暗啲、電話放遠啲。身體收到訊號，就會易啲入睡 🌙"},
      {topic:"🧩 壓力釋放",category:"情緒",content:"今日如果好多嘢諗，寫低三件要做嘅事就算。腦袋唔使成晚幫你記住，瞓覺先放鬆 🧩"},
      {topic:"🏠 屋企輕訓練",category:"恢復",content:"冇時間去 gym 都可以做10下深蹲、10下靠牆掌上壓。少少郁動，已經比完全唔郁好 🏠"},
      {topic:"🧘‍♂️ 腰背保養",category:"拉筋",content:"腰背實唔一定要大力捽，先做貓牛式或者抱膝30秒。溫柔啲，身體先肯放鬆 🧘‍♂️"},
      {topic:"💪 今日鼓勵版",category:"情緒",content:"你唔需要日日爆練先叫努力。肯飲水、肯郁、肯休息，已經係長期進步嘅底子 💪"},
      {topic:"💧 飲水提醒",category:"飲水",content:"早晨！今日記得每小時飲半杯水喇～唔使多，但要持續！身體唔會喊渴，但會暗啞咁累你 😅"},
      {topic:"🧘 拉筋小提示",category:"拉筋",content:"得閒坐定定？起身拉下筋先！由頸到腳，10分鐘都得，筋鬆咗，腰背唔會喊救命 💪"},
      {topic:"💻 工作間小運動",category:"拉筋",content:"打字打到手痺？起身伸個懶腰 + 轉下肩，30秒都好過唔動！你嘅肩頸會多謝你 🙏"},
      {topic:"😴 睡前關懷",category:"睡眠",content:"今晚唔好追劇追到太夜～11點前瞓，身體修復力最強！明早醒得爽，運動都更勁 😴"},
      {topic:"❤️ 飲水 + 拉筋 combo",category:"恢復",content:"飲完水，順手拉下大腿後側？一舉兩得～身體唔會話你做緊乜，但會記住你對佢好 ❤️"},
      {topic:"🏋️ 健身後提醒",category:"恢復",content:"練完記得補水+輕拉筋！唔使多，5分鐘都好，肌肉唔會喊痛，你明日先唔會行路似企鵝 🦆"},
      {topic:"🌿 周末放鬆版",category:"恢復",content:"週末唔使逼自己練到爆，但記得起身走走、拉拉筋、飲夠水～放鬆先係真係進步 🌿"},
      {topic:"🫶 情緒關懷版",category:"情緒",content:"今日有冇覺得好累？唔使硬撐，飲杯溫水 + 深呼吸3次，身體同心都會鬆一啲 🫶"},
      {topic:"🥤 飲水趣味版",category:"飲水",content:"你今日飲咗幾杯水？唔記得？咁就由而家開始，每做完一件事就飲一口～慢慢就成日飲到喇 🥤"},
      {topic:"💪 鼓勵收尾版",category:"情緒",content:"你唔使做完美，但記得對自己好啲～飲水、拉筋、休息，都係愛自己嘅方式 💪❤️"},
      {topic:"☀️ 朝早起身拉筋",category:"拉筋",content:"起身未？未郁之前喺床拉下小腿同後腰，30秒就夠。醒得快過飲咖啡 ☀️"},
      {topic:"💧 返工前飲水",category:"飲水",content:"出門前飲一杯水，當係俾腸胃嘅 morning call。全日狀態會爭好遠 💧"},
      {topic:"🚶 飯後散步",category:"恢復",content:"食完飯唔好即刻坐低，行5分鐘。幫助消化之餘，仲唔會飯氣攻心 🚶"},
      {topic:"😌 放工放鬆肩頸",category:"拉筋",content:"收工啦！膊頭係咪硬到石頭？用熱毛巾敷下＋輕輕打圈按，好快鬆返 😌"},
      {topic:"📺 夜晚煲劇拉筋",category:"拉筋",content:"一路煲劇一路拉大腿前後側，不知不覺拉完15分鐘。娛樂＋保養一次過 📺"},
      {topic:"🛌 瞓前關手機",category:"睡眠",content:"瞓前半個鐘放低電話，望下天花板發吓呆。睡眠質素好過你食 supplement 🛌"},
      {topic:"✈️ 長途車／飛機提醒",category:"恢復",content:"搭車搭飛機記得每45分鐘郁下腳腕同膝頭。防水腫，仲防腳痺 ✈️"},
      {topic:"🥵 天氣熱飲水提醒",category:"飲水",content:"今日好熱，出汗多過平時。唔好等到口乾先飲，嗰時已經遲咗一步 🥵💦"},
      {topic:"❤️ 身體疲勞關懷",category:"情緒",content:"呢幾日如果覺得攰，唔好夾硬做重訓。散步＋拉筋＋飲暖水已經好叻 ❤️"},
      {topic:"🌟 自我肯定收尾",category:"情緒",content:"你今日已經做得好好。飲咗水、郁過下、有休息。咁就夠，唔使完美 🌟"}
    ];

    const grid = document.getElementById('messageGrid');

    function renderCards(data){
      grid.innerHTML = '';
      data.forEach((item,index)=>{
        grid.innerHTML += `
          <article class="card" data-category="${item.category}">
            <div>
              <div class="card-number">Template ${index + 1}</div>
              <div class="topic">${item.topic}</div>
              <div class="content" id="content-${index}">${item.content}</div>
            </div>
            <button class="copy-btn" onclick="copyText(${index}, this)">📋 Copy</button>
          </article>`;
      });
    }

    function copyText(index, button){
      const text = document.getElementById(`content-${index}`).innerText;
      navigator.clipboard.writeText(text);
      button.innerText = '✅ 已複製';
      button.classList.add('copy-success');
      setTimeout(()=>{
        button.innerText = '📋 Copy';
        button.classList.remove('copy-success');
      },1500);
    }

    function filterCards(category){
      if(category === 'all'){
        renderCards(messages);
        return;
      }
      renderCards(messages.filter(m => m.category === category));
    }

    document.getElementById('searchInput').addEventListener('input', function(){
      const keyword = this.value.toLowerCase();
      const filtered = messages.filter(item =>
        item.topic.toLowerCase().includes(keyword) ||
        item.content.toLowerCase().includes(keyword) ||
        item.category.toLowerCase().includes(keyword)
      );
      renderCards(filtered);
    });

    renderCards(messages);
  </script>
</body>
</html>
