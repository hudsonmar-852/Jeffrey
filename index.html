  <script>
    const messages = [
      {topic:"🚨 緊急通告",category:"😈 魔鬼教練",content:"今日發現好多人偷懶嘅藉口係「落雨濕濕」。我幫你睇過天文台，陣間會細雨啲。我畀多個藉口你：「陣間見唔到我個樣會周身唔聚財」。換衫，30分鐘後見。覆我個 🔥，代表你出門口。"},
      {topic:"💡 健身小知識",category:"😈 魔鬼教練",content:"研究話，望住鏡做 Gym 可以提升表現。所以你今日望鏡嗰陣，除咗覺得自己靚／型，記得望埋姿勢啱唔啱。影低你今日 workout 姿勢 send 畀我，我免費幫你做 Remote 姿勢執正。覆 📸。"},
      {topic:"🌅 早晨喚醒",category:"😈 魔鬼教練",content:"我知你仲瞓緊，但我想話你知，你今日個背肌／線條就差「起身」呢一下就完美。快啲起身飲杯暖水，覆我一個 Good Morning sticker，我回你今日專屬打氣 voice。"},
      {topic:"🍽️ 飲食警察出動",category:"😈 魔鬼教練",content:"突然好想 check 下你個雪櫃。影張相畀我睇下你今日準備咗咩午餐。如果見到西蘭花同雞胸，我即刻封你做自律達人；如果見到珍珠奶茶……你知點做啦，自己跑多5km。覆 🍽️。"},
      {topic:"😴 睡眠質素關注組",category:"😈 魔鬼教練",content:"練咗咁耐，唔識瞓覺就嘥氣。今晚11點前，應承我熄電話。覆我個 🌙 代表收到。聽朝起身你會發覺水腫少咗，輪廓出返嚟，唔使多謝我。"},
      {topic:"💰 慳錢貼士",category:"🤣 搞笑到肉",content:"使幾萬蚊買名牌袋？不如跟我練多兩堂，練到個 Body 名牌出嚟，著件白 Tee 都好睇過人哋啲 Winter Collection。今日嚟唔嚟拎你件天生名牌？覆 YES 留位。"},
      {topic:"🦸‍♂️ 超級英雄論",category:"🤣 搞笑到肉",content:"你估點解 Batman 咁勁？因為佢著住套緊身衫嗰陣，冇肚腩。你今日著 Sport Bra／Tank Top 前，望一望個 mirror。如果覺得自己似 Batman，send 個自拍畀我，我幫你加個蝙蝠俠 logo（講笑，但我想睇成果）。覆 🦇。"},
      {topic:"👻 鬼咁靚系列",category:"🤣 搞笑到肉",content:"你知唔知點解做運動要出汗？因為汗水就係你以前啲脂肪喺度喊緊。你想佢哋喊大聲啲（爆汗）定喊細聲啲（hea 做）？覆「大」或「細」，我幫你 set 今日喊包難度。"},
      {topic:"🐷 養豬定養人",category:"🤣 搞笑到肉",content:"我唔想我啲客變咗 Happy Pig，雖然都幾可愛。今日我 set 咗個趕豬計劃，邊個覆我最快，我今日就 train 得佢最甘，但最有效。你係咪第一個？覆 🐷。"},
      {topic:"📈 股神投資法",category:"🤣 搞笑到肉",content:"最近個市跌到喊？不如投資喺自己身上。你身型嘅回報率 ROI，一定高過而家好多藍籌股。今日嚟上堂，我保證你心情升500點。覆 📈 留位，唔好做大閘蟹。"},
      {topic:"🤫 獨家試煉",category:"🎯 教練小心機",content:"今日我喺 YouTube／IG 拍咗條新片，講點樣用一條毛巾練腹肌，未公開㗎。想做第一個試玩？而家覆我「毛巾」，我直接 send 條片畀你，但你要交返份用後感。"},
      {topic:"🎯 目標鎖定",category:"🎯 教練小心機",content:"仲記唔記得你最初同我講想減幾多／想大隻幾多？我偷偷幫你記低咗。想唔想知你而家去到邊個 Stage？今日上堂我話你知。覆 ❓ 代表你仲記得個目標。"},
      {topic:"🎵 節奏大師",category:"🎯 教練小心機",content:"今日 playlist 由你決定。傷心嘅人唔好聽慢歌，做 Gym 嘅人要聽快歌。你而家講首最想聽嘅歌名畀我，我即刻準備，等你陣間 Burpee 嗰陣都識笑。覆 🎵。"},
      {topic:"🧘 都市解藥",category:"🎯 教練小心機",content:"我知你今日開完會可能好躁底。唔使做劇烈運動，我教你一招辦公椅拉筋大法，5分鐘鬆返開條氣。想學就覆我「鬆」，我拍條1分鐘 short video 私人醒你。"},
      {topic:"🏆 今日威水位",category:"🎯 教練小心機",content:"今日嚟上堂，我會準備部靚相機。做完 train 個樣最殘但又最型嗰個，我幫你影張相放上 Story 表揚你嘅努力殘樣，仲 tag 你。要唔要呢個位？覆「要」，我幫你留 quota。"},
      {topic:"☕ 早餐提醒",category:"⚡ 超短版",content:"飲咗咖啡未？未飲嘅話，今日唔好齋啡頂硬上，記得補返少少 protein。收到覆 ☕，代表你聽教聽話。"},
      {topic:"🦵 腳痛預警",category:"⚡ 超短版",content:"聽日如果行路覺得酸痛，記得多謝今日咁努力嘅自己。同埋記得拉筋。冇覆我 = 你應承我會拉。"},
      {topic:"⏰ 遲到點算",category:"⚡ 超短版",content:"如果陣間遲咗少少，唔緊要，最緊要到。我等你。但遲到要罰唱歌／請食蛋治。你敢唔敢覆我「遲到」兩個字？"},
      {topic:"💧 飲水提示",category:"⚡ 超短版",content:"睇到呢個 msg 嘅同時，請飲一啖水。你今日飲到第幾杯？覆我個數字，如果少過6杯，我陣間 train 你會特別照顧你。"},
      {topic:"🤝 最後的溫柔",category:"⚡ 超短版",content:"呢個 world 好亂，但 Gym Room 好 peaceful。只要你企喺我面前，拎起對 dumbbell，你就贏咗全世界嗰99%淨係坐喺度嘅人。今日見唔見到你？覆 💪 就算數。"},
      {topic:"🎯 忙到冇時間版",category:"Tailor-made",content:"今日就算忙到飛起，都唔好成個人交晒俾工作。飲兩啖水、企起身郁30秒，已經係幫身體留返條命仔。覆我個 🎯，當你完成今日最低消費。"},
      {topic:"💬 教練關心版",category:"Tailor-made",content:"今日唔使做到完美，最緊要唔好完全唔理自己。飲水、拉一拉、早少少收機，已經好實際。收到就覆我個 💬，等我知你有聽話。"},
      {topic:"🏙️ 香港上班族版",category:"Tailor-made",content:"返工搭車、坐 office、開會開到人都硬晒，其實你個身體好耐冇真正郁過。等陣行多幾步，俾腰背有返少少生命力。覆 🏙️ 我當你出咗去行。"},
      {topic:"🧠 壓力大但唔講版",category:"情緒",content:"你唔講攰，身體都會講。肩頸實、呼吸淺、眼攰，就係 signal。停一停，慢慢吸三啖氣先。覆我 🧠，我知你仲撐得住但唔使硬撐。"},
      {topic:"💪 Gym Client 鼓勵版",category:"恢復",content:"唔係每次都要爆練先叫進步。今日肯出現、肯郁、肯恢復，已經係長期變強嘅一部分。覆我 💪，我幫你記低今日有出現。"},
      {topic:"🧘 肩頸救援版",category:"拉筋",content:"如果而家膊頭已經硬晒，唔好等痛先處理。膊頭向後轉10下，頸左右慢慢拉，30秒已經有分別。做完覆我 🧘。"},
      {topic:"🥤 水樽提示版",category:"飲水",content:"望一望你支水，而家飲三啖。唔需要儀式感，照顧身體好多時就係呢啲細到不能再細嘅動作。飲完覆我 🥤。"},
      {topic:"🌙 夜晚收慢版",category:"睡眠",content:"今晚唔好俾個腦繼續開會。沖個暖水涼、拉一拉小腿、電話放遠啲，俾自己真正落機。收到覆 🌙，我當你今晚會乖。"},
      {topic:"🌧️ 今日雨天濕熱提醒",category:"今日雨天",content:"今日又落雨又焗，唔好以為冇太陽就唔會流汗。記得少少多次飲水，個人會舒服好多。覆 🌧️，等我知你有補水。"},
      {topic:"☔ 出門防滑提醒",category:"今日雨天",content:"今日地下濕滑，出街行慢半拍。鞋底要踩實，落樓梯扶一扶，安全先係最型。覆 ☔，唔好扮英雄。"},
      {topic:"💦 雨天都要補水",category:"今日雨天",content:"落雨天都會焗到出汗，唔好等口乾先飲。每隔一陣飲幾啖，精神會穩好多。覆 💦，我當你飲咗第一輪。"},
      {topic:"🧦 濕鞋濕襪提醒",category:"今日雨天",content:"如果鞋襪濕咗，返到去盡快換。腳長時間焗住好易攰同唔舒服，照顧細節就係照顧身體。覆 🧦，我知你有聽。"},
      {topic:"🌬️ 冷氣房保暖",category:"今日雨天",content:"今日外面濕熱，入到冷氣房好易一凍一熱。帶件薄外套，唔好俾肩頸凍到硬晒。覆 🌬️，今日唔好凍親自己。"},
      {topic:"🧘 雨天肩頸放鬆",category:"今日雨天",content:"落雨天濕氣重，肩頸特別易實。抽30秒轉下膊、拉下頸，唔使大動作都有用。做完覆 🧘。"},
      {topic:"🚶 室內步行版",category:"今日雨天",content:"今日唔方便戶外行，就喺室內行幾分鐘。搭𨋢前後、茶水間來回，都算係俾身體郁返。覆 🚶，我當你行咗一圈。"},
      {topic:"🥵 濕熱降溫提醒",category:"今日雨天",content:"又濕又熱最易令人冇精神。飲水、抹汗、鬆一鬆領口，唔好硬頂，身體會舒服返啲。覆 🥵，今日慢慢嚟都得。"},
      {topic:"😴 雨天睡眠提醒",category:"今日雨天",content:"今晚濕氣重，瞓前開少少抽濕或者風扇，房間舒服啲，瞓得自然沉啲。覆 😴，今晚早少少收機。"},
      {topic:"❤️ 今日溫柔收尾",category:"今日雨天",content:"今日天氣又濕又焗，已經唔容易。記得飲水、行慢啲、拉一拉筋，照顧自己就夠好。覆 ❤️，今日收尾算你叻。"},
      {topic:"💧 起身第一杯水",category:"飲水",content:"起身第一件事唔係睇電話，係飲幾啖水。身體瞓咗成晚，先幫佢開機。飲完覆 💧。"},
      {topic:"🪑 坐耐起身郁",category:"拉筋",content:"坐咗一個鐘就起身30秒，伸下腰、轉下膊。唔使流汗，重點係唔好俾身體生銹。覆 🪑，即刻起身。"},
      {topic:"🥗 午餐後輕行",category:"恢復",content:"食完飯唔好即刻攤低，行5至10分鐘。消化順啲，下午冇咁易飯氣攻心。覆 🥗，我當你唔會即刻坐死。"},
      {topic:"👣 腳踝小運動",category:"拉筋",content:"坐低都可以郁腳踝，順時針逆時針各轉10下。小動作，對小腿同循環好有幫助。做完覆 👣。"},
      {topic:"🫁 深呼吸 Reset",category:"情緒",content:"覺得心煩或者攰，停一停，慢慢吸氣4秒、呼氣6秒，做3次。人會即刻定啲。覆 🫁，我陪你 reset。"},
      {topic:"🧍 站姿提醒",category:"拉筋",content:"企立時唔好成日側埋一邊，兩腳平均踩地，肚微收。腰背會少啲投訴。覆 🧍，今日企返好。"},
      {topic:"🍵 下午提神版",category:"飲水",content:"下午眼瞓未必一定要咖啡，先飲杯水再行兩分鐘。好多時係身體缺水同太耐冇郁。覆 🍵，唔好即刻衝去買咖啡。"},
      {topic:"🧊 運動前熱身",category:"恢復",content:"開練前唔好即刻上重量，先做5分鐘熱身。關節醒咗，肌肉先識幫你出力。覆 🧊，今日唔准偷熱身。"},
      {topic:"🍌 運動後補充",category:"恢復",content:"練完記得補水同食返少少蛋白質。肌肉唔係練嗰刻變強，係恢復嗰陣變強。覆 🍌，我當你有補。"},
      {topic:"📱 手機頸提醒",category:"拉筋",content:"睇電話唔好成個頭跌落去，手機拎高少少。頸椎唔係吊機，唔好日日叫佢頂硬上。覆 📱，即刻調整。"},

    ];
    let currentCategory='all';
    const grid=document.getElementById('messageGrid');
    const searchInput=document.getElementById('searchInput');
    function getUsedMessages(){try{return JSON.parse(localStorage.getItem('usedJeffreyMessages')||'{}')}catch(e){return {}}}
    function saveUsedMessages(data){localStorage.setItem('usedJeffreyMessages',JSON.stringify(data))}
    function renderCards(){const keyword=searchInput.value.trim().toLowerCase();const used=getUsedMessages();grid.innerHTML='';messages.forEach((msg,index)=>{const combinedText=(msg.topic+' '+msg.category+' '+msg.content).toLowerCase();const matchCategory=currentCategory==='all'||msg.category===currentCategory;const matchSearch=!keyword||combinedText.includes(keyword);if(!matchCategory||!matchSearch)return;const card=document.createElement('div');const isNew=index<20;const isUsed=used[index];card.className='card'+(isNew?' new-template':'')+(isUsed?' used':'');const lastUsed=isUsed?'<span class="used-badge">已用</span>':'';const newTag=isNew?'<span class="tag">🔥 高回覆率 NEW</span>':'<span></span>';card.innerHTML=`<div><div class="card-number"><span>Template ${index+1} ${lastUsed}</span>${newTag}</div><div class="category">${msg.category}</div><div class="topic">${msg.topic}</div><div class="content">${msg.content}</div><div class="use-meta">${isUsed?'上次已 Copy，可留意避免重複使用':'未使用，可即刻貼去 WhatsApp'}</div></div><button class="copy-btn ${isUsed?'used':''}" onclick="copyMessage(${index},this)">📋 一鍵 Copy 去 WhatsApp</button>`;grid.appendChild(card)})}
    function filterCards(category,btn){currentCategory=category;document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderCards()}
    function copyMessage(index,button){const text=messages[index].content;navigator.clipboard.writeText(text).then(()=>{const used=getUsedMessages();used[index]=new Date().toISOString();saveUsedMessages(used);button.textContent='✅ 已 Copy';button.classList.add('copy-success');setTimeout(renderCards,800)}).catch(()=>{const textarea=document.createElement('textarea');textarea.value=text;document.body.appendChild(textarea);textarea.select();document.execCommand('copy');document.body.removeChild(textarea);button.textContent='✅ 已 Copy';setTimeout(renderCards,800)})}
    searchInput.addEventListener('input',renderCards);renderCards();
  </script>
