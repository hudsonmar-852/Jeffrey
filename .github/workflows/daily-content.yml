name: Daily AIOS Content

on:
  schedule:
    - cron: "15 23 * * *" # 07:15 Asia/Hong_Kong (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-aios-content
  cancel-in-progress: false

jobs:
  collect-transform-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Collect official sources and transform content
        run: python scripts/generate_daily_content.py

      - name: Validate production output
        run: python scripts/validate_production.py

      - name: Commit changed production data
        run: |
          if git diff --quiet -- data/today.json; then
            echo "No production data change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git commit -m "data: refresh Jeffrey AIOS daily production content"
          git push origin HEAD:main
