<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TOPIC_TITLE}}</title>
  <style>
    :root{
      --bg:#101820;--card:#17232e;--cream:#f7f0df;--muted:#c9c0aa;
      --gold:#d6b46a;--teal:#3db6a3;--emerald:#0f5f4a;--line:rgba(247,240,223,.18)
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--cream);line-height:1.55}.guide{width:100%;max-width:430px;margin:0 auto;background:var(--bg)}.page{min-height:100vh;padding:34px 24px 74px;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid var(--line);position:relative}.page-number{position:absolute;top:18px;right:22px;font-size:13px;letter-spacing:.08em;color:var(--gold)}.eyebrow{color:var(--teal);font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}h1{font-size:clamp(34px,9vw,42px);line-height:1.12;margin:0 0 18px;color:var(--cream)}h2{font-size:clamp(28px,7.6vw,34px);line-height:1.18;margin:0 0 18px;color:var(--cream)}p{font-size:20px;margin:0 0 14px}.sub{font-size:17px;color:var(--muted);margin-bottom:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,.18)}.quote{margin-top:20px;padding:20px;border-left:5px solid var(--gold);background:rgba(214,180,106,.12);border-radius:16px;font-size:21px;font-weight:800;color:#fff7e5}.list{padding:0;margin:18px 0 0;list-style:none}.list li{font-size:19px;margin-bottom:12px;padding-left:22px;position:relative}.list li:before{content:"";width:8px;height:8px;border-radius:999px;background:var(--gold);position:absolute;left:0;top:11px}.light{background:#f5eedc;color:#18222b}.light h1,.light h2,.light p{color:#18222b}.light .sub{color:#59614f}.light .card{background:#fff9ed;border-color:rgba(15,95,74,.18)}.light .quote{color:#18222b;background:rgba(15,95,74,.1);border-left-color:var(--emerald)}.light .list li:before{background:var(--emerald)}.nav{position:absolute;right:18px;bottom:18px;display:flex;gap:9px;align-items:center}.nav a{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:20px;font-weight:800;color:var(--cream);background:rgba(214,180,106,.22);border:1px solid rgba(214,180,106,.45)}.light .nav a{color:#18222b;background:rgba(15,95,74,.12);border-color:rgba(15,95,74,.35)}.toc-link{color:inherit;text-decoration:none;border-bottom:1px solid currentColor}.footer-line{margin-top:28px;font-size:15px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
  </style>
</head>
<body>
<main class="guide">

  <section class="page" id="content">
    <div class="page-number">01 / {{TOTAL_PAGES}}</div>
    <div class="eyebrow">Mobile Guidebook</div>
    <h1>{{TOPIC_TITLE}}</h1>
    <p class="sub">{{OBJECTIVE}}</p>
    <div class="card">
      <p><strong>內容結構</strong></p>
      <ul class="list">
        <li><a class="toc-link" href="#p2">{{SECTION_1}}</a></li>
        <li><a class="toc-link" href="#p3">{{SECTION_2}}</a></li>
        <li><a class="toc-link" href="#p4">{{SECTION_3}}</a></li>
      </ul>
    </div>
    <div class="nav"><a href="#content">⌂</a><a href="#content">‹</a><a href="#p2">›</a></div>
  </section>

  <section class="page light" id="p2">
    <div class="page-number">02 / {{TOTAL_PAGES}}</div>
    <div class="eyebrow">{{CATEGORY}}</div>
    <h2>{{PAGE_TITLE}}</h2>
    <ul class="list">
      <li>{{POINT_1}}</li>
      <li>{{POINT_2}}</li>
      <li>{{POINT_3}}</li>
    </ul>
    <div class="quote">{{QUOTE_OR_ACTION}}</div>
    <div class="nav"><a href="#content">⌂</a><a href="#content">‹</a><a href="#p3">›</a></div>
  </section>

  <!-- Duplicate section.page blocks as needed. Update IDs, page numbers, and nav links. -->

</main>
</body>
</html>
